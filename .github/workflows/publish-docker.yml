name: Docker Images

on:
  push:
    branches: [ master ]
    paths:
      - 'docker/**'
  workflow_dispatch:
    inputs:
      image:
        description: 'Specific image to build (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - standard
          - riscv
          - android
          - sme2

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: standard
            platforms: linux/amd64,linux/arm64
          - image: riscv
            platforms: linux/amd64
          - image: android
            platforms: linux/amd64
          - image: sme2
            platforms: linux/arm64
    steps:
      - name: Check if this image should be built
        id: check
        run: |
          if [[ -z "${{ inputs.image }}" || "${{ inputs.image }}" == "${{ matrix.image }}" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v6
        if: steps.check.outputs.should_build == 'true'

      - name: Set up QEMU
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/xnnpack/${{ matrix.image }}:latest
            ghcr.io/${{ github.repository_owner }}/xnnpack/${{ matrix.image }}:${{ github.sha }}

