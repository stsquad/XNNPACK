name: Build and update caches
on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'docker/**'
  workflow_dispatch:
    inputs:
      job-filter:
        description: 'Only run specific job(s) - comma-separated list (empty = all jobs)'
        default: ''
        required: false
        type: string

jobs:
  build-and-test:
    uses: ./.github/workflows/build.yml
    with:
      run-tests: false
      update-caches: true
      job-filter: ${{ inputs.job-filter || '' }}
